@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #FAF7F2; overscroll-behavior: none; }
#root { height: 100%; }
body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
input { font-size: 16px; }
.pft-scroll::-webkit-scrollbar { display: none; } .pft-scroll { scrollbar-width: none; }
/* App shell: lock the outer frame to the visible screen; scroll only inside a tab */
.pft-frame { height: 100%; overflow: hidden; }
.pft-screen { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.pft-lock { height: 100%; overflow: hidden; }
/* keep the tab bar above the iPhone home indicator */
.pft-nav { padding-bottom: calc(16px + env(safe-area-inset-bottom)) !important; }
.pft-fade { animation: pftFade .32s ease; }
.pft-slide { animation: pftSlide .3s cubic-bezier(.2,.8,.2,1); }
.pft-sheet { animation: pftUp .3s cubic-bezier(.2,.8,.2,1); }
.pft-pop { animation: pftPop .16s ease; transform-origin: top right; }
.pft-toast { animation: pftToast .25s ease; }
.pft-key:active { background: #F1ECE1; transform: scale(.96); }
.pft-ribbon { transition: width .5s cubic-bezier(.2,.8,.2,1); }
.pft-bar { animation: pftGrow .55s cubic-bezier(.2,.8,.2,1); }
.pft-shake { animation: pftShake .35s; }
@keyframes pftFade { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }
@keyframes pftSlide { from { opacity:0; transform: translateX(16px);} to {opacity:1; transform:none;} }
@keyframes pftUp { from { transform: translateY(100%);} to { transform:none;} }
@keyframes pftPop { from { opacity:0; transform: scale(.94);} to {opacity:1; transform:none;} }
@keyframes pftToast { from { opacity:0; transform: translate(-50%,10px);} to {opacity:1; transform: translate(-50%,0);} }
@keyframes pftGrow { from { transform: scaleX(.3); opacity:.4;} to { transform:none; opacity:1;} }
@keyframes pftShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
input[type=date]::-webkit-calendar-picker-indicator { filter: sepia(.3) opacity(.5); }
@media (prefers-reduced-motion: reduce) { * { animation:none!important; transition:none!important; } }
</style>

<script type="text/plain" id="edit-guide">
========================================================================
  LEDGER  —  personal finance tracker  (single self-contained web app)
========================================================================

WHAT THIS FILE IS
  One HTML file that runs entirely in the browser. React is inlined, so it
  works fully offline once loaded. Your data is saved on THIS device in the
  browser's localStorage (keys: "pft_config" and "pft_txns"). Nothing is
  sent anywhere; there is no server and no account.

BACKUP / MOVING DEVICES
  Open the app > Settings > "Export a backup" to download a JSON file.
  "Restore from backup" loads it on any device. Do this before switching
  phones or clearing Safari data (clearing site data erases the app's data).

------------------------------------------------------------------------
HOW TO CHANGE THINGS LATER
------------------------------------------------------------------------
The human-readable source of this app lives in this same file, inside the
script tag with  id="source-jsx"  (it is type="text/plain", so it does NOT
run — it is stored purely as the editable master copy). The code that
actually RUNS is the compiled version in the LAST <script> tag.

EASIEST PATH: give this whole .html file to an AI assistant (e.g. Claude)
and say what you want changed. Tell it: "The readable source is in the
script#source-jsx block. Edit that, recompile it with Babel
(@babel/preset-react, classic runtime), and paste the result back into the
final <script> so the running app matches." That is exactly how this file
was built.

COMMON TWEAKS AND WHERE THEY LIVE (in the source-jsx block):

  COLORS / THEME  ->  the object called `T` near the top.
      bg        = page background (currently cream #FAF7F2)
      surface   = cards (#FFFDF8)
      ink       = main text (near-black)
      accent    = the single accent colour (amber #B8792A) used for the
                  active tab, buttons, selected chips, Add button, etc.
      over      = the "over budget" red
      line      = thin border colour
      CATC      = the array of category colours used in the charts

  DEFAULT CARDS / ACCOUNTS / INVESTMENT TYPES / CATEGORIES / BUDGETS
      ->  the object called `DEFAULT_CONFIG`. (Note: once you've used the
          app, your live data lives in localStorage, not here — change your
          cards/categories from inside Settings. DEFAULT_CONFIG only seeds a
          brand-new install.)

  WELCOME QUOTES  ->  the array called `QUOTES` (text, author pairs).

  SAMPLE DATA shown on first open  ->  the function `sampleTxns()`.

/* ── Cross-analysis engine ──────────────────────────────────────────────── */
function matchChain(t,chain){
  return chain.every(f=>{
    if(f.dim==="kind") return t.kind===f.value;
    if(f.dim==="category") return t.category===f.value;
    if(f.dim==="source") return t.source===f.value;
    return true;
  });
}
function isInvestScope(chain){ return chain.some(f=>f.dim==="kind"&&f.value==="invest"); }
function nextDim(chain){
  const fixed=new Set(chain.map(f=>f.dim));
  if(isInvestScope(chain)) return fixed.has("source")?null:"source";
  if(!fixed.has("category")) return "category";
  if(!fixed.has("source")) return "source";
  return null;
}
function buildBreakdown(txns,chain,cfg){
  const catMap=Object.fromEntries(cfg.categories.map(c=>[c.name,c]));
  const matches=txns.filter(t=>matchChain(t,chain));
  const total=matches.reduce((a,t)=>a+num(t.amount),0);
  const dim=nextDim(chain);
  let rows=[];
  if(dim){
    const g={};
    matches.forEach(t=>{
      const key=dim==="category"?(t.category||"Uncategorised"):t.source;
      if(!g[key]) g[key]={key,val:0,kind:t.kind};
      g[key].val+=num(t.amount);
    });
    rows=Object.values(g).sort((a,b)=>b.val-a.val).map((r,i)=>{
      let color,icon="";
      if(dim==="category"){ color=catMap[r.key]?.color||T.muted; icon=catMap[r.key]?.icon||"•"; }
      else { color=r.kind==="card"?"#5B7B9A":r.kind==="savings"?"#C08552":"#8E7CA8"; }
      return {...r,color,icon};
    });
  }
  return {matches,total,dim,rows};
}
